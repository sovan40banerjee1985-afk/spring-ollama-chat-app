services:
  postgres:
    image: postgres:16-alpine
    container_name: llmchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: llmchat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - llmchat-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  llmchat-pgdata: