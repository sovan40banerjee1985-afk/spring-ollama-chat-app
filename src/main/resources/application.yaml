spring:
  application:
    name: chat-app
  datasource:
    url: jdbc:postgresql://localhost:5432/llmchat
    username: postgres
    password: mypassword

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

ollama:
  base-url: http://localhost:11434
  model: llama3.2